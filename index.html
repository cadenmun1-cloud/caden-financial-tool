<!DOCTYPE html>
<html>
<head>
  <title>Caden Munro Financial Analysis Tool</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: #111827;
      min-height: 100vh;
      padding: 40px;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 44px;
      margin-bottom: 10px;
    }

    .header p {
      color: #dbeafe;
      font-size: 18px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.28);
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 16px;
      align-items: end;
      margin-bottom: 28px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      box-sizing: border-box;
    }

    button {
      padding: 15px 26px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 25px;
    }

    .card {
      background: #f8fafc;
      padding: 22px;
      border-radius: 18px;
      border: 1px solid #e2e8f0;
      text-align: center;
    }

    .card h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      color: #475569;
    }

    .card p {
      margin: 0;
      font-size: 26px;
      font-weight: bold;
      color: #0f172a;
    }

    #status {
      text-align: center;
      font-weight: bold;
      color: #2563eb;
      margin-bottom: 20px;
    }

    #chart {
      margin-top: 25px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
    }

    .note {
      font-size: 14px;
      color: #64748b;
      margin-top: 18px;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="header">
  <h1>Caden Munro Financial Analysis Tool</h1>
  <p>Real stock data, financial metrics, and live chart analysis</p>
</div>

<div class="container">

  <div class="inputs">
    <div>
      <label>Stock Ticker</label>
      <input id="ticker" value="AAPL" placeholder="Example: AAPL, TSLA, MSFT">
    </div>

    <div>
      <label>Risk-Free Rate (%)</label>
      <input id="rf" value="2" placeholder="Example: 2">
    </div>

    <button onclick="calculate()">Calculate</button>
  </div>

  <div id="status">Enter a ticker and click Calculate.</div>

  <div class="results">
    <div class="card">
      <h3>Average Return</h3>
      <p id="avg">--</p>
    </div>

    <div class="card">
      <h3>Volatility</h3>
      <p id="vol">--</p>
    </div>

    <div class="card">
      <h3>Beta</h3>
      <p id="beta">--</p>
    </div>

    <div class="card">
      <h3>Sharpe Ratio</h3>
      <p id="sharpe">--</p>
    </div>
  </div>

  <div id="chart"></div>

  <p class="note">
    Market benchmark used for beta: SPY. Data range: 1 month daily prices.
  </p>

</div>

<script>
aasync function getData(ticker) {
  let symbol = ticker.toLowerCase() + ".us";
  let stooqUrl = `https://stooq.com/q/d/l/?s=${symbol}&i=d`;
  let proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(stooqUrl)}`;

  let res = await fetch(proxyUrl);
  let csv = await res.text();

  let rows = csv.trim().split("\n").slice(-30);
  let prices = [];

  for (let i = 1; i < rows.length; i++) {
    let columns = rows[i].split(",");
    let closePrice = Number(columns[4]);

    if (!isNaN(closePrice)) {
      prices.push(closePrice);
    }
  }

  return prices;
}

  return data.chart.result[0].indicators.quote[0].close.filter(x => x !== null);
}

function returns(prices) {
  let r = [];

  for (let i = 1; i < prices.length; i++) {
    r.push(((prices[i] - prices[i - 1]) / prices[i - 1]) * 100);
  }

  return r;
}

function avg(arr) {
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function std(arr, mean) {
  let variance = arr.reduce((sum, x) => sum + Math.pow(x - mean, 2), 0) / arr.length;
  return Math.sqrt(variance);
}

function beta(stock, market) {
  let avgStock = avg(stock);
  let avgMarket = avg(market);

  let covariance = 0;
  let marketVariance = 0;

  for (let i = 0; i < stock.length; i++) {
    covariance += (stock[i] - avgStock) * (market[i] - avgMarket);
    marketVariance += Math.pow(market[i] - avgMarket, 2);
  }

  return covariance / marketVariance;
}

function loadChart(ticker) {
  document.getElementById("chart").innerHTML = `
    <iframe 
      src="https://s.tradingview.com/widgetembed/?symbol=NASDAQ:${ticker}&interval=D&theme=light"
      width="100%" 
      height="420" 
      frameborder="0">
    </iframe>
  `;
}

async function calculate() {
  let ticker = document.getElementById("ticker").value.toUpperCase().trim();
  let rf = Number(document.getElementById("rf").value);
  let status = document.getElementById("status");

  if (ticker === "") {
    status.innerText = "Please enter a stock ticker.";
    return;
  }

  status.innerText = "Loading real stock data...";

  try {
    let stockPrices = await getData(ticker);
    let marketPrices = await getData("SPY");

    let stockReturns = returns(stockPrices);
    let marketReturns = returns(marketPrices);

    let averageReturn = avg(stockReturns);
    let volatility = std(stockReturns, averageReturn);
    let stockBeta = beta(stockReturns, marketReturns);
    let sharpeRatio = (averageReturn - rf) / volatility;

    document.getElementById("avg").innerText = averageReturn.toFixed(2) + "%";
    document.getElementById("vol").innerText = volatility.toFixed(2);
    document.getElementById("beta").innerText = stockBeta.toFixed(2);
    document.getElementById("sharpe").innerText = sharpeRatio.toFixed(2);

    loadChart(ticker);

    status.innerText = "Results calculated successfully for " + ticker + ".";
  } catch (error) {
    status.innerText = "Error loading data. Try another ticker like AAPL, MSFT, or TSLA.";
  }
}
</script>

</body>
</html>
