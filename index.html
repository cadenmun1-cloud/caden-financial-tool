<!DOCTYPE html>
<html>
<head>
  <title>Caden Munro Financial Calculator</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f1f5f9;
    }

    .nav {
      background: #0f172a;
      color: white;
      padding: 15px 30px;
      font-size: 20px;
      font-weight: bold;
    }

    .nav span {
      font-weight: normal;
      color: #94a3b8;
      font-size: 14px;
      margin-left: 10px;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h2 {
      margin-top: 0;
      color: #0f172a;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    label {
      font-size: 14px;
      color: #475569;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .result-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      border: 1px solid #e2e8f0;
    }

    .result-box h4 {
      margin: 0;
      font-size: 13px;
      color: #64748b;
    }

    .result-box p {
      margin: 5px 0 0;
      font-size: 20px;
      font-weight: bold;
      color: #0f172a;
    }

    #chart {
      margin-top: 25px;
      height: 280px;
      display: flex;
      align-items: end;
      gap: 5px;
    }

    .bar {
      flex: 1;
      background: #22c55e;
      border-radius: 5px 5px 0 0;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #e2e8f0;
    }

    th {
      background: #f1f5f9;
    }
  </style>
</head>

<body>

<div class="nav">
  Caden Munro Financial Dashboard
  <span>Retirement + TVM Calculator</span>
</div>

<div class="container">

  <div class="card">
    <h2>Retirement Calculator</h2>

    <div class="grid">
      <div><label>Current Age<input id="currentAge" value="22"></label></div>
      <div><label>Retirement Age<input id="retirementAge" value="65"></label></div>
      <div><label>Current Savings<input id="currentSavings" value="5000"></label></div>
      <div><label>Monthly Contribution<input id="monthlyContribution" value="300"></label></div>
      <div><label>Return (%)<input id="annualReturn" value="7"></label></div>
      <div><label>Inflation (%)<input id="inflationRate" value="3"></label></div>
    </div>

    <button onclick="calculateRetirement()">Calculate</button>

    <div class="results">
      <div class="result-box"><h4>Years</h4><p id="years">--</p></div>
      <div class="result-box"><h4>Future Value</h4><p id="futureValue">--</p></div>
      <div class="result-box"><h4>Real Value</h4><p id="realValue">--</p></div>
      <div class="result-box"><h4>Monthly Income</h4><p id="monthlyIncome">--</p></div>
    </div>

    <div id="chart"></div>

    <table>
      <thead>
        <tr><th>Year</th><th>Age</th><th>Balance</th></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>TVM Calculator</h2>

    <div class="grid">
      <div><label>PV<input id="pv" value="1000"></label></div>
      <div><label>FV<input id="fv"></label></div>
      <div><label>PMT<input id="pmt" value="100"></label></div>
      <div><label>I %<input id="rate" value="7"></label></div>
      <div><label>N<input id="n" value="10"></label></div>
    </div>

    <button onclick="calculateTVM()">Calculate</button>

    <div class="result-box" style="margin-top:15px;">
      <h4>Result</h4>
      <p id="tvmResult">--</p>
    </div>
  </div>

</div>

<script>
function money(v){return "$"+Math.round(v).toLocaleString();}

function calculateRetirement(){
  let age=+currentAge.value;
  let retire=+retirementAge.value;
  let savings=+currentSavings.value;
  let contrib=+monthlyContribution.value;
  let r=+annualReturn.value/100;
  let inf=+inflationRate.value/100;

  let years=retire-age;
  let bal=savings;
  let table="";
  let chart="";
  let max=0;

  for(let i=1;i<=years;i++){
    bal=bal*(1+r)+contrib*12;
    if(bal>max) max=bal;
  }

  bal=savings;
  for(let i=1;i<=years;i++){
    bal=bal*(1+r)+contrib*12;
    table+=`<tr><td>${i}</td><td>${age+i}</td><td>${money(bal)}</td></tr>`;
    chart+=`<div class="bar" style="height:${bal/max*250}px"></div>`;
  }

  years.innerText=years;
  futureValue.innerText=money(bal);
  realValue.innerText=money(bal/Math.pow(1+inf,years));
  monthlyIncome.innerText=money(bal*0.04/12);

  tableBody.innerHTML=table;
  document.getElementById("chart").innerHTML=chart;
}

function calculateTVM(){
  let pv=+pvInput();
  let fv=+fvInput();
  let pmt=+pmtInput();
  let r=+rateInput()/100;
  let n=+nInput();

  if(isNaN(fv)){
    fv=pv*Math.pow(1+r,n)+pmt*((Math.pow(1+r,n)-1)/r);
    tvmResult.innerText=money(fv);
  }else{
    tvmResult.innerText="Leave one blank";
  }
}

function pvInput(){return parseFloat(document.getElementById("pv").value);}
function fvInput(){return parseFloat(document.getElementById("fv").value);}
function pmtInput(){return parseFloat(document.getElementById("pmt").value);}
function rateInput(){return parseFloat(document.getElementById("rate").value);}
function nInput(){return parseFloat(document.getElementById("n").value);}

calculateRetirement();
</script>

</body>
</html>
