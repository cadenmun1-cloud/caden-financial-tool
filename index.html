<!DOCTYPE html>
<html>
<head>
  <title>Caden Munro Financial Calculator</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: white;
      padding: 40px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .container {
      background: white;
      color: black;
      max-width: 600px;
      margin: auto;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .note {
      font-size: 14px;
      color: #555;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<h1>Caden Munro Financial Calculator</h1>
<p>Leave ONE field blank to solve for it</p>

<div class="container">

  <input id="pv" placeholder="Present Value (PV)">
  <input id="fv" placeholder="Future Value (FV)">
  <input id="pmt" placeholder="Payment (PMT)">
  <input id="rate" placeholder="Interest Rate (I %)">
  <input id="n" placeholder="Number of Periods (N)">

  <button onclick="calculate()">Calculate</button>

  <div class="result" id="result"></div>

  <p class="note">
    Assumes compound interest. Interest rate should be annual %.
  </p>

</div>

<script>

function calculate() {

  let pv = parseFloat(document.getElementById("pv").value);
  let fv = parseFloat(document.getElementById("fv").value);
  let pmt = parseFloat(document.getElementById("pmt").value);
  let r = parseFloat(document.getElementById("rate").value) / 100;
  let n = parseFloat(document.getElementById("n").value);

  let result = "";

  // Solve FV
  if (isNaN(fv)) {
    fv = pv * Math.pow(1+r, n) + pmt * ((Math.pow(1+r,n)-1)/r);
    result = "Future Value = $" + fv.toFixed(2);
  }

  // Solve PV
  else if (isNaN(pv)) {
    pv = (fv - pmt * ((Math.pow(1+r,n)-1)/r)) / Math.pow(1+r,n);
    result = "Present Value = $" + pv.toFixed(2);
  }

  // Solve PMT
  else if (isNaN(pmt)) {
    pmt = (fv - pv*Math.pow(1+r,n)) * r / (Math.pow(1+r,n)-1);
    result = "Payment = $" + pmt.toFixed(2);
  }

  // Solve N (approximation)
  else if (isNaN(n)) {
    n = Math.log((fv*r + pmt)/(pv*r + pmt)) / Math.log(1+r);
    result = "Periods (N) = " + n.toFixed(2);
  }

  else {
    result = "Leave one field blank to solve.";
  }

  document.getElementById("result").innerText = result;
}

</script>

</body>

</html>
